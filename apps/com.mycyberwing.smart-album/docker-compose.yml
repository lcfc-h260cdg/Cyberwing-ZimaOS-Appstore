name: smart-album
services:
  database:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    restart: unless-stopped
    ports:
    - mode: ingress
      target: 5432
      published: '15432'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      target: /var/lib/postgresql/data
      bind:
        create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready --host=127.0.0.1 --dbname=immich --username=postgres || exit 1
      timeout: 5s
      interval: 2s
      retries: 300
    command: []
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    shm_size: '134217728'
  immich-init:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-server:v1.0.1
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_init
    restart: unless-stopped
    networks:
      default: null
    healthcheck:
      test:
      - CMD
      - test
      - -f
      - /tmp/init-complete
      timeout: 3s
      interval: 2s
      retries: 300
      start_period: 5m0s
    command:
    - 'touch /tmp/init-complete

      exec tail -f /dev/null

      '
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    tmpfs:
    - /tmp
  immich-machine-learning:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-machine-learning:v1.0.0
    container_name: immich_machine_learning
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: true
    ports:
    - mode: ingress
      target: 3003
      published: '13003'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/AI_MODELS/immich
      target: /cache
      bind:
        create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    healthcheck: {}
    command: []
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
  immich-server:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-server:v1.0.1
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_server
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: true
      immich-init:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    ports:
    - mode: ingress
      target: 9230
      published: '9230'
      protocol: tcp
    - mode: ingress
      target: 9231
      published: '9231'
      protocol: tcp
    - mode: ingress
      target: 2283
      published: '2283'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/LCFC_APP/data/smart_album/library/photos
      target: /data
      bind:
        create_host_path: true
    - type: bind
      source: /DATA/Gallery
      target: /DATA/Gallery
      bind:
        create_host_path: true
    - type: bind
      source: /etc/localtime
      target: /etc/localtime
      read_only: true
      bind:
        create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_BUILD: '9654404849'
      IMMICH_BUILD_IMAGE: development
      IMMICH_BUILD_IMAGE_URL: https://github.com/immich-app/immich/pkgs/container/immich-server
      IMMICH_BUILD_URL: https://github.com/immich-app/immich/actions/runs/9654404849
      IMMICH_HELMET_FILE: 'true'
      IMMICH_REPOSITORY: immich-app/immich
      IMMICH_REPOSITORY_URL: https://github.com/immich-app/immich
      IMMICH_SOURCE_COMMIT: af2efbdbbddc27cd06142f22253ccbbbbeec1f55
      IMMICH_SOURCE_REF: local
      IMMICH_SOURCE_URL: https://github.com/immich-app/immich/commit/af2efbdbbddc27cd06142f22253ccbbbbeec1f55
      IMMICH_THIRD_PARTY_BUG_FEATURE_URL: https://github.com/immich-app/immich/issues
      IMMICH_THIRD_PARTY_DOCUMENTATION_URL: https://docs.immich.app
      IMMICH_THIRD_PARTY_SOURCE_URL: https://github.com/immich-app/immich/
      IMMICH_THIRD_PARTY_SUPPORT_URL: https://docs.immich.app/community-guides
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    healthcheck: {}
    command:
    - immich-dev
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    tmpfs:
    - /tmp
  immich-web:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-web:v1.0.1
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_web
    restart: unless-stopped
    depends_on:
      immich-init:
        condition: service_healthy
        required: true
      immich-server:
        condition: service_started
        required: true
    ports:
    - mode: ingress
      target: 3000
      published: '3000'
      protocol: tcp
    - mode: ingress
      target: 24678
      published: '24678'
      protocol: tcp
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    command:
    - immich-web
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    tmpfs:
    - /tmp
  redis:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/valkey/valkey:9
    container_name: immich_redis
    restart: unless-stopped
    networks:
      default: null
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli ping || exit 1
      timeout: 3s
      interval: 2s
      retries: 30
    command: []
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
  immich-bootstrap:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_bootstrap
    restart: 'no'
    depends_on:
      database:
        condition: service_healthy
        required: true
      immich-server:
        condition: service_started
        required: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_BOOTSTRAP_ADMIN_EMAIL: admin@lcfc.com
      IMMICH_BOOTSTRAP_ADMIN_NAME: admin
      IMMICH_BOOTSTRAP_ADMIN_PASSWORD: admin
      IMMICH_BOOTSTRAP_API_BASE: http://immich-server:2283/api
      IMMICH_BOOTSTRAP_API_KEY_HASH: ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e
      IMMICH_BOOTSTRAP_API_KEY_NAME: API Key
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    entrypoint:
    - /usr/bin/bash
    - -ec
    - "set -u\n\nserver_ready() {\n  if ! { exec 3<>/dev/tcp/immich-server/2283; }\
      \ 2>/dev/null; then\n    return 1\n  fi\n\n  printf 'GET /api/server/ping HTTP/1.1\\\
      r\\nHost: immich-server\\r\\nConnection: close\\r\\n\\r\\n' >&3\n  if head -n\
      \ 1 <&3 | grep -q ' 200 '; then\n    exec 3<&-\n    exec 3>&-\n    return 0\n\
      \  fi\n\n  exec 3<&-\n  exec 3>&-\n  return 1\n}\n\nadmin_exists() {\n  PGPASSWORD=postgres\
      \ psql -h database -U postgres -d immich -At <<'SQL' | grep -qx t\nSELECT EXISTS\
      \ (SELECT 1 FROM \"user\" WHERE email = 'admin@lcfc.com');\nSQL\n}\n\ncreate_admin()\
      \ {\n  if ! { exec 3<>/dev/tcp/immich-server/2283; } 2>/dev/null; then\n   \
      \ return 1\n  fi\n\n  printf 'POST /api/auth/admin-sign-up HTTP/1.1\\r\\nHost:\
      \ immich-server\\r\\nContent-Type: application/json\\r\\nContent-Length: 60\\\
      r\\nConnection: close\\r\\n\\r\\n{\"email\":\"admin@lcfc.com\",\"password\"\
      :\"admin\",\"name\":\"admin\"}' >&3\n  cat <&3 >/dev/null || true\n  exec 3<&-\n\
      \  exec 3>&-\n}\n\necho \"[immich-bootstrap] waiting for postgres\"\nfor _ in\
      \ {1..300}; do\n  if pg_isready -h database -U postgres -d immich >/dev/null\
      \ 2>&1; then\n    break\n  fi\n  sleep 2\ndone\nif ! pg_isready -h database\
      \ -U postgres -d immich >/dev/null 2>&1; then\n  echo \"[immich-bootstrap] timed\
      \ out waiting for postgres\" >&2\n  exit 1\nfi\n\necho \"[immich-bootstrap]\
      \ waiting for immich server\"\nfor _ in {1..300}; do\n  if server_ready; then\n\
      \    break\n  fi\n  sleep 2\ndone\nif ! server_ready; then\n  echo \"[immich-bootstrap]\
      \ timed out waiting for immich server\" >&2\n  exit 1\nfi\n\nif ! admin_exists;\
      \ then\n  echo \"[immich-bootstrap] creating admin user admin@lcfc.com\"\n \
      \ create_admin || true\nfi\n\necho \"[immich-bootstrap] waiting for admin user\"\
      \nfor _ in {1..30}; do\n  if admin_exists; then\n    break\n  fi\n  sleep 2\n\
      done\nif ! admin_exists; then\n  echo \"[immich-bootstrap] admin user was not\
      \ created: admin@lcfc.com\" >&2\n  exit 1\nfi\n\necho \"[immich-bootstrap] ensuring\
      \ fixed api key\"\nPGPASSWORD=postgres psql -h database -U postgres -d immich\
      \ -v ON_ERROR_STOP=1 <<'SQL'\nINSERT INTO api_key (\"userId\", \"name\", \"\
      key\", \"permissions\")\nSELECT id,\n       'API Key',\n       decode('ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e',\
      \ 'hex'),\n       ARRAY['all']::character varying[]\nFROM \"user\"\nWHERE email\
      \ = 'admin@lcfc.com'\n  AND NOT EXISTS (\n    SELECT 1\n    FROM api_key\n \
      \   WHERE key = decode('ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e',\
      \ 'hex')\n  );\nSQL\n\necho \"[immich-bootstrap] done\"\n"
    command: []
networks:
  default:
    name: smart-album_default
x-casaos:
  id: com.mycyberwing.smart-album
  main: immich-web
  index: /
  port_map: '3000'
  scheme: http
  icon: https://cdn.jsdelivr.net/gh/lcfc-h260cdg/Cyberwing-ZimaOS-Appstore@gh-pages/apps/com.mycyberwing.smart-album/assets/icon.png
  title:
    en_US: Smart Album
    zh_CN: 智能相册
  version: 1.0.1
