name: smart-album
services:
  database:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:928c580aa718930fd471442dde28cd91e20e8ddb067343605111db734400b394
    container_name: immich_postgres
    restart: unless-stopped
    ports:
    - mode: ingress
      target: 5432
      published: '15432'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      target: /var/lib/postgresql/data
      bind:
        create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready --host=127.0.0.1 --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
        || exit 1
      timeout: 5s
      interval: 2s
      retries: 300
    command: []
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    shm_size: '134217728'
  immich-init:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-server:v1.0.1@sha256:410e6e7c10cab043c61678ae4b57c91809e926e01f2f5d0eae3bf4b05c76fec0
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_init
    restart: unless-stopped
    networks:
      default: null
    healthcheck:
      test:
      - CMD
      - test
      - -f
      - /tmp/init-complete
      timeout: 3s
      interval: 2s
      retries: 300
      start_period: 5m0s
    command:
    - 'touch /tmp/init-complete

      exec tail -f /dev/null

      '
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    tmpfs:
    - /tmp
  immich-machine-learning:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-machine-learning:v1.0.0@sha256:b1632bdf9f8bcea9d1c192541f5c44d7135c7d6791e978934fe3b1dea87f8894
    container_name: immich_machine_learning
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: true
    ports:
    - mode: ingress
      target: 3003
      published: '13003'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/AI_MODELS/immich
      target: /cache
      bind:
        create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    healthcheck: {}
    command: []
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
  immich-server:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-server:v1.0.1@sha256:410e6e7c10cab043c61678ae4b57c91809e926e01f2f5d0eae3bf4b05c76fec0
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_server
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: true
      immich-init:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    ports:
    - mode: ingress
      target: 9230
      published: '9230'
      protocol: tcp
    - mode: ingress
      target: 9231
      published: '9231'
      protocol: tcp
    - mode: ingress
      target: 2283
      published: '2283'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/LCFC_APP/data/smart_album/library/photos
      target: /data
      bind:
        create_host_path: true
    - type: bind
      source: /DATA/Gallery
      target: /DATA/Gallery
      bind:
        create_host_path: true
    - type: bind
      source: /etc/localtime
      target: /etc/localtime
      read_only: true
      bind:
        create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_BUILD: '9654404849'
      IMMICH_BUILD_IMAGE: development
      IMMICH_BUILD_IMAGE_URL: https://github.com/immich-app/immich/pkgs/container/immich-server
      IMMICH_BUILD_URL: https://github.com/immich-app/immich/actions/runs/9654404849
      IMMICH_HELMET_FILE: 'true'
      IMMICH_REPOSITORY: immich-app/immich
      IMMICH_REPOSITORY_URL: https://github.com/immich-app/immich
      IMMICH_SOURCE_COMMIT: af2efbdbbddc27cd06142f22253ccbbbbeec1f55
      IMMICH_SOURCE_REF: local
      IMMICH_SOURCE_URL: https://github.com/immich-app/immich/commit/af2efbdbbddc27cd06142f22253ccbbbbeec1f55
      IMMICH_THIRD_PARTY_BUG_FEATURE_URL: https://github.com/immich-app/immich/issues
      IMMICH_THIRD_PARTY_DOCUMENTATION_URL: https://docs.immich.app
      IMMICH_THIRD_PARTY_SOURCE_URL: https://github.com/immich-app/immich/
      IMMICH_THIRD_PARTY_SUPPORT_URL: https://docs.immich.app/community-guides
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    healthcheck: {}
    command:
    - immich-dev
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    tmpfs:
    - /tmp
  immich-web:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-web:v1.0.1@sha256:1bcd69f7168190c8d1a85d19af1037a26f1f663f75ca9c653668a7b6c2a0343d
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_web
    restart: unless-stopped
    depends_on:
      immich-init:
        condition: service_healthy
        required: true
      immich-server:
        condition: service_started
        required: true
    ports:
    - mode: ingress
      target: 3000
      published: '3000'
      protocol: tcp
    - mode: ingress
      target: 24678
      published: '24678'
      protocol: tcp
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    networks:
      default: null
    command:
    - immich-web
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
    tmpfs:
    - /tmp
  redis:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/valkey/valkey:9@sha256:7a48ff82d4b41e6faa1de0e10a1343bcfef8f0a7a0cd5df4b5b360daf7ab0139
    container_name: immich_redis
    restart: unless-stopped
    networks:
      default: null
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli ping || exit 1
      timeout: 3s
      interval: 2s
      retries: 30
    command: []
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: '33115533312'
        reservations: {}
  immich-bootstrap:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:928c580aa718930fd471442dde28cd91e20e8ddb067343605111db734400b394
    container_name: immich_bootstrap
    restart: 'no'
    depends_on:
      database:
        condition: service_healthy
        required: true
      immich-server:
        condition: service_started
        required: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_BOOTSTRAP_ADMIN_EMAIL: admin@lcfc.com
      IMMICH_BOOTSTRAP_ADMIN_NAME: admin
      IMMICH_BOOTSTRAP_ADMIN_PASSWORD: admin
      IMMICH_BOOTSTRAP_API_BASE: http://immich-server:2283/api
      IMMICH_BOOTSTRAP_API_KEY_HASH: ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e
      IMMICH_BOOTSTRAP_API_KEY_NAME: API Key
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    entrypoint:
    - /usr/bin/bash
    - -ec
    - "set -u\n\nAPI_BASE=\"$${IMMICH_BOOTSTRAP_API_BASE:-http://immich-server:2283/api}\"\
      \nADMIN_EMAIL=\"$${IMMICH_BOOTSTRAP_ADMIN_EMAIL:-admin@lcfc.com}\"\nADMIN_PASSWORD=\"\
      $${IMMICH_BOOTSTRAP_ADMIN_PASSWORD:-admin}\"\nADMIN_NAME=\"$${IMMICH_BOOTSTRAP_ADMIN_NAME:-admin}\"\
      \nAPI_KEY_NAME=\"$${IMMICH_BOOTSTRAP_API_KEY_NAME:-API Key}\"\nAPI_KEY_HASH=\"\
      $${IMMICH_BOOTSTRAP_API_KEY_HASH:-ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e}\"\
      \n\n: \"$${DB_USERNAME:?DB_USERNAME is required}\"\n: \"$${DB_PASSWORD:?DB_PASSWORD\
      \ is required}\"\n: \"$${DB_DATABASE_NAME:?DB_DATABASE_NAME is required}\"\n\
      \nexport PGPASSWORD=\"$$DB_PASSWORD\"\n\npsql_immich() {\n  psql -h database\
      \ -U \"$$DB_USERNAME\" -d \"$$DB_DATABASE_NAME\" \"$$@\"\n}\n\nhttp_request()\
      \ {\n  local method=\"$$1\"\n  local url=\"$$2\"\n  local body=\"$${3:-}\"\n\
      \  local target=\"$${url#http://}\"\n  local host=\"$${target%%/*}\"\n  local\
      \ path=\"/$${target#*/}\"\n  local port=80\n  local status\n\n  if [ \"$$host\"\
      \ != \"$${host%:*}\" ]; then\n    port=\"$${host##*:}\"\n    host=\"$${host%:*}\"\
      \n  fi\n\n  if ! { exec 3<>\"/dev/tcp/$$host/$$port\"; } 2>/dev/null; then\n\
      \    return 1\n  fi\n  if [ \"$$method\" = \"POST\" ]; then\n    printf 'POST\
      \ %s HTTP/1.1\\r\\nHost: %s\\r\\nContent-Type: application/json\\r\\nContent-Length:\
      \ %s\\r\\nConnection: close\\r\\n\\r\\n%s' \"$$path\" \"$$host\" \"$${#body}\"\
      \ \"$$body\" >&3\n  else\n    printf 'GET %s HTTP/1.1\\r\\nHost: %s\\r\\nConnection:\
      \ close\\r\\n\\r\\n' \"$$path\" \"$$host\" >&3\n  fi\n  IFS=$$'\\r' read -r\
      \ status <&3 || status=\"\"\n  cat <&3 >/dev/null || true\n  exec 3<&-\n  exec\
      \ 3>&-\n\n  case \"$$status\" in\n    HTTP/1.*\\ 2??*) return 0 ;;\n    *) return\
      \ 1 ;;\n  esac\n}\n\necho \"[immich-bootstrap] waiting for postgres\"\nattempt=0\n\
      until pg_isready -h database -U \"$$DB_USERNAME\" -d \"$$DB_DATABASE_NAME\"\
      \ >/dev/null 2>&1; do\n  attempt=$$((attempt + 1))\n  if [ \"$$attempt\" -ge\
      \ 300 ]; then\n    echo \"[immich-bootstrap] timed out waiting for postgres\"\
      \ >&2\n    exit 1\n  fi\n  sleep 2\ndone\n\necho \"[immich-bootstrap] waiting\
      \ for immich server\"\nattempt=0\nuntil http_request GET \"$$API_BASE/server/ping\"\
      ; do\n  attempt=$$((attempt + 1))\n  if [ \"$$attempt\" -ge 300 ]; then\n  \
      \  echo \"[immich-bootstrap] timed out waiting for immich server\" >&2\n   \
      \ exit 1\n  fi\n  sleep 2\ndone\n\necho \"[immich-bootstrap] waiting for migrations\"\
      \nattempt=0\nuntil [ \"$$(psql_immich -At <<'SQL'\nSELECT to_regclass('public.\"\
      user\"') IS NOT NULL\n    AND to_regclass('public.api_key') IS NOT NULL;\nSQL\n\
      )\" = \"t\" ]; do\n  attempt=$$((attempt + 1))\n  if [ \"$$attempt\" -ge 300\
      \ ]; then\n    echo \"[immich-bootstrap] timed out waiting for migrations\"\
      \ >&2\n    exit 1\n  fi\n  sleep 2\ndone\n\nif [ \"$$(psql_immich -v admin_email=\"\
      $$ADMIN_EMAIL\" -At <<'SQL'\nSELECT EXISTS (SELECT 1 FROM \"user\" WHERE email\
      \ = :'admin_email');\nSQL\n)\" != \"t\" ]; then\n  echo \"[immich-bootstrap]\
      \ creating admin user $$ADMIN_EMAIL\"\n  payload=$$(printf '{\"email\":\"%s\"\
      ,\"password\":\"%s\",\"name\":\"%s\"}' \"$$ADMIN_EMAIL\" \"$$ADMIN_PASSWORD\"\
      \ \"$$ADMIN_NAME\")\n  http_request POST \"$$API_BASE/auth/admin-sign-up\" \"\
      $$payload\" || true\nfi\n\necho \"[immich-bootstrap] waiting for admin user\"\
      \nattempt=0\nuntil [ \"$$(psql_immich -v admin_email=\"$$ADMIN_EMAIL\" -At <<'SQL'\n\
      SELECT EXISTS (SELECT 1 FROM \"user\" WHERE email = :'admin_email');\nSQL\n\
      )\" = \"t\" ]; do\n  attempt=$$((attempt + 1))\n  if [ \"$$attempt\" -ge 30\
      \ ]; then\n    echo \"[immich-bootstrap] admin user was not created: $$ADMIN_EMAIL\"\
      \ >&2\n    exit 1\n  fi\n  sleep 2\ndone\n\necho \"[immich-bootstrap] ensuring\
      \ fixed api key\"\npsql_immich \\\n  -v ON_ERROR_STOP=1 \\\n  -v admin_email=\"\
      $$ADMIN_EMAIL\" \\\n  -v api_key_name=\"$$API_KEY_NAME\" \\\n  -v api_key_hash=\"\
      $$API_KEY_HASH\" <<'SQL'\nINSERT INTO api_key (\"userId\", \"name\", \"key\"\
      , \"permissions\")\nSELECT id,\n        :'api_key_name',\n        decode(:'api_key_hash',\
      \ 'hex'),\n        ARRAY['all']::character varying[]\nFROM \"user\"\nWHERE email\
      \ = :'admin_email'\n  AND NOT EXISTS (\n    SELECT 1\n    FROM api_key\n   \
      \ WHERE key = decode(:'api_key_hash', 'hex')\n  );\nSQL\n\necho \"[immich-bootstrap]\
      \ done\"\n"
    command: []
networks:
  default:
    name: smart-album_default
x-casaos:
  id: com.mycyberwing.smart-album
  main: immich-web
  index: /
  port_map: '3000'
  scheme: http
  icon: https://cdn.jsdelivr.net/gh/lcfc-h260cdg/Cyberwing-ZimaOS-Appstore@gh-pages/apps/com.mycyberwing.smart-album/assets/icon.png
  title:
    en_US: Smart Album
    zh_CN: 智能相册
  version: 1.0.1
