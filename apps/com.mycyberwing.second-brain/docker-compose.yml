name: second-brain
services:
  second-brain:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/second-brain:v1.0.0
    container_name: second-brain
    restart: unless-stopped
    ports:
    - mode: ingress
      target: 3030
      published: '3030'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/LCFC_APP/data/hermes-data
      target: /wiki-root
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: /DATA/AppData/LCFC_APP/data/second-brain
      target: /app/data
      bind:
        create_host_path: true
    environment:
      SECOND_BRAIN_ADMIN_USER: admin
      SECOND_BRAIN_ADMIN_PASSWORD: admin
      SECOND_BRAIN_HOST: 0.0.0.0
      SECOND_BRAIN_PORT: '3030'
      ADAPTER_PROTOCOL: https
      ADAPTER_PORT: 8787
      ADAPTER_API_KEY: change-me-local-dev
      HOST_DATA_ROOT: /DATA/AppData/LCFC_APP/data/hermes-data
      CONTAINER_DATA_ROOT: /wiki-root
    healthcheck:
      test:
      - CMD
      - wget
      - -qO
      - /dev/null
      - http://127.0.0.1:3030/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
networks:
  default:
    name: second-brain_default
x-casaos:
  id: com.mycyberwing.second-brain
  main: second-brain
  index: /
  port_map: '3030'
  scheme: http
  icon: https://cdn.jsdelivr.net/gh/lcfc-h260cdg/Cyberwing-ZimaOS-Appstore@gh-pages/apps/com.mycyberwing.second-brain/assets/icon.png
  title:
    en_US: Second Brain
    zh_CN: 第二大脑
  version: 1.0.0
