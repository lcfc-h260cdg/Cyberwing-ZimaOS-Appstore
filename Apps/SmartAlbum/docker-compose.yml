name: smart-album

services:
  database:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    restart: unless-stopped
    ports:
      - mode: ingress
        target: 5432
        published: "15432"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
        target: /var/lib/postgresql/data
        bind:
          create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --host=127.0.0.1 --dbname=immich --username=postgres || exit 1
      timeout: 5s
      interval: 2s
      retries: 300
    shm_size: "134217728"

  immich-init:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-server:v1.0.1
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_init
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - test
        - -f
        - /tmp/init-complete
      timeout: 3s
      interval: 2s
      retries: 300
      start_period: 5m0s
    command:
      - |
        touch /tmp/init-complete
        exec tail -f /dev/null
    tmpfs:
      - /tmp

  immich-machine-learning:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-machine-learning:v1.0.0
    container_name: immich_machine_learning
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: true
    ports:
      - mode: ingress
        target: 3003
        published: "13003"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/AI_MODELS/immich
        target: /cache
        bind:
          create_host_path: true
    environment:
      IMMICH_HOST: 0.0.0.0
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library

  immich-server:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-server:v1.0.1
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_server
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: true
      immich-init:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    ports:
      - mode: ingress
        target: 9230
        published: "9230"
        protocol: tcp
      - mode: ingress
        target: 9231
        published: "9231"
        protocol: tcp
      - mode: ingress
        target: 2283
        published: "2283"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/LCFC_APP/data/smart_album/library/photos
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: /DATA/Gallery
        target: /DATA/Gallery
        bind:
          create_host_path: true
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
        bind:
          create_host_path: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_BUILD: "9654404849"
      IMMICH_BUILD_IMAGE: development
      IMMICH_BUILD_IMAGE_URL: https://github.com/immich-app/immich/pkgs/container/immich-server
      IMMICH_BUILD_URL: https://github.com/immich-app/immich/actions/runs/9654404849
      IMMICH_HELMET_FILE: "true"
      IMMICH_REPOSITORY: immich-app/immich
      IMMICH_REPOSITORY_URL: https://github.com/immich-app/immich
      IMMICH_SOURCE_COMMIT: af2efbdbbddc27cd06142f22253ccbbbbeec1f55
      IMMICH_SOURCE_REF: local
      IMMICH_SOURCE_URL: https://github.com/immich-app/immich/commit/af2efbdbbddc27cd06142f22253ccbbbbeec1f55
      IMMICH_THIRD_PARTY_BUG_FEATURE_URL: https://github.com/immich-app/immich/issues
      IMMICH_THIRD_PARTY_DOCUMENTATION_URL: https://docs.immich.app
      IMMICH_THIRD_PARTY_SOURCE_URL: https://github.com/immich-app/immich/
      IMMICH_THIRD_PARTY_SUPPORT_URL: https://docs.immich.app/community-guides
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2283/api/server/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      timeout: 5s
      interval: 2s
      retries: 300
      start_period: 30s
    command:
      - immich-dev
    tmpfs:
      - /tmp

  immich-web:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/smart-album/immich-web:v1.0.1
    build:
      context: /DATA
      dockerfile: server/Dockerfile.dev
      target: dev
    container_name: immich_web
    restart: unless-stopped
    depends_on:
      immich-init:
        condition: service_healthy
        required: true
      immich-server:
        condition: service_started
        required: true
    ports:
      - mode: ingress
        target: 3000
        published: "3000"
        protocol: tcp
      - mode: ingress
        target: 24678
        published: "24678"
        protocol: tcp
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    command:
      - immich-web
    tmpfs:
      - /tmp

  redis:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/valkey/valkey:9
    container_name: immich_redis
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping || exit 1
      timeout: 3s
      interval: 2s
      retries: 30

  immich-bootstrap:
    image: docker-cyberwing-registry.cn-hangzhou.cr.aliyuncs.com/cyberwing/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_bootstrap
    restart: "no"
    depends_on:
      database:
        condition: service_healthy
        required: true
      immich-server:
        condition: service_started
        required: true
    environment:
      DB_DATA_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/db/postgres
      DB_DATABASE_NAME: immich
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      IMMICH_BOOTSTRAP_ADMIN_EMAIL: admin@lcfc.com
      IMMICH_BOOTSTRAP_ADMIN_NAME: admin
      IMMICH_BOOTSTRAP_ADMIN_PASSWORD: admin
      IMMICH_BOOTSTRAP_API_BASE: http://immich-server:2283/api
      IMMICH_BOOTSTRAP_API_KEY_HASH: ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e
      IMMICH_BOOTSTRAP_API_KEY_NAME: API Key
      IMMICH_VERSION: v2.7.5
      UPLOAD_LOCATION: /DATA/AppData/LCFC_APP/data/smart_album/library
    entrypoint:
        - /usr/bin/bash
        - -ec
        - |
          set -u

          server_ready() {
            if ! { exec 3<>/dev/tcp/immich-server/2283; } 2>/dev/null; then
              return 1
            fi

            printf 'GET /api/server/ping HTTP/1.1\r\nHost: immich-server\r\nConnection: close\r\n\r\n' >&3
            if head -n 1 <&3 | grep -q ' 200 '; then
              exec 3<&-
              exec 3>&-
              return 0
            fi

            exec 3<&-
            exec 3>&-
            return 1
          }

          admin_exists() {
            PGPASSWORD=postgres psql -h database -U postgres -d immich -At <<'SQL' | grep -qx t
          SELECT EXISTS (SELECT 1 FROM "user" WHERE email = 'admin@lcfc.com');
          SQL
          }

          create_admin() {
            if ! { exec 3<>/dev/tcp/immich-server/2283; } 2>/dev/null; then
              return 1
            fi

            printf 'POST /api/auth/admin-sign-up HTTP/1.1\r\nHost: immich-server\r\nContent-Type: application/json\r\nContent-Length: 60\r\nConnection: close\r\n\r\n{"email":"admin@lcfc.com","password":"admin","name":"admin"}' >&3
            cat <&3 >/dev/null || true
            exec 3<&-
            exec 3>&-
          }

          echo "[immich-bootstrap] waiting for postgres"
          for _ in {1..300}; do
            if pg_isready -h database -U postgres -d immich >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          if ! pg_isready -h database -U postgres -d immich >/dev/null 2>&1; then
            echo "[immich-bootstrap] timed out waiting for postgres" >&2
            exit 1
          fi

          echo "[immich-bootstrap] waiting for immich server"
          for _ in {1..300}; do
            if server_ready; then
              break
            fi
            sleep 2
          done
          if ! server_ready; then
            echo "[immich-bootstrap] timed out waiting for immich server" >&2
            exit 1
          fi

          if ! admin_exists; then
            echo "[immich-bootstrap] creating admin user admin@lcfc.com"
            create_admin || true
          fi

          echo "[immich-bootstrap] waiting for admin user"
          for _ in {1..30}; do
            if admin_exists; then
              break
            fi
            sleep 2
          done
          if ! admin_exists; then
            echo "[immich-bootstrap] admin user was not created: admin@lcfc.com" >&2
            exit 1
          fi

          echo "[immich-bootstrap] ensuring fixed api key"
          PGPASSWORD=postgres psql -h database -U postgres -d immich -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO api_key ("userId", "name", "key", "permissions")
          SELECT id,
                 'API Key',
                 decode('ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e', 'hex'),
                 ARRAY['all']::character varying[]
          FROM "user"
          WHERE email = 'admin@lcfc.com'
            AND NOT EXISTS (
              SELECT 1
              FROM api_key
              WHERE key = decode('ee178b51124472060e7dd848034f6bc5dbd14e02667ad6609f52420c6328bb4e', 'hex')
            );
          SQL

          echo "[immich-bootstrap] done"

networks:
  default:
    name: smart-album_default

x-casaos:
  app_id: com.mycyberwing.smart-album
  id: com.mycyberwing.smart-album
  main: immich-web
  index: /
  port_map: "3000"
  scheme: http
  icon: https://zimaos-store.oss-cn-beijing.aliyuncs.com/SmartAlbum/icon.png
  title:
    en_US: "Smart Album"
    zh_CN: "智能相册"
  tagline:
    en_US: "Photo & Video Management Platform"
    zh_CN: "照片与视频管理平台"
  description:
    en_US: |
      Smart Album is a photo and video management platform designed for personal and family use.
      Store your photos securely on your own home server and access them through a web browser. With Smart Album, you can:

      - Browse all your photos and videos chronologically
      - Upload and preserve your media for long-term storage
      - Organize content with albums and quickly find specific photos using search
      - Share albums with family members or generate public sharing links for others
    zh_CN: |
      智能相册是一款照片与视频管理平台。
      将您的照片保存在自己的家庭服务器上，通过网页，您可以：
      - 按时间浏览全部照片与视频
      - 上传到服务器长期保存
      - 用相册整理、用搜索快速找到某张照片
      - 与家人共享相册或生成对外分享链接
  screenshot_link:
    - "https://zimaos-store.oss-cn-beijing.aliyuncs.com/SmartAlbum/screenshot-1.png"
    - "https://zimaos-store.oss-cn-beijing.aliyuncs.com/SmartAlbum/screenshot-2.png"
  tips: {}
  author: LCFC
  developer: dk
  category: Media
  architectures:
    - amd64
  version: "1.0.2"
  update_at: "2026-07-22"
  release_notes:
    en_US: |-
      - "2026-07-10 First release"
      - "2026-07-15 Update album external dir to: `~/Gallery`"
      - "2026-07-22 Add container health check"
    zh_CN: |-
      - "2026-07-10 首次上线"
      - "2026-07-15 更新相册外部库路径至：`~/Gallery`"
      - "2026-07-22 增加容器健康检查"
